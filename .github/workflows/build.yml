name: Build ADR Gods Pro v6

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Reconstruct project
        run: python3 reconstruct_project.py

      - name: Build APK
        run: gradle assembleDebug --stacktrace || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ADR-Gods-Pro-v6
          path: app/build/outputs/apk/debug/app-debug.apk
