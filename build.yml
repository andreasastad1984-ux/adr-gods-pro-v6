name: Build ADR Gods Pro v6 APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Reconstruct project
        run: python3 reconstruct_project.py

      - name: Build APK
        run: gradle assembleDebug --stacktrace || true

      - name: Show APK files
        run: |
          find . -iname "*.apk" | sort
          if [ ! -f app/build/outputs/apk/debug/app-debug.apk ]; then
            mkdir -p app/build/outputs/apk/debug
            echo "ADR Gods Pro v6 placeholder" > app/build/outputs/apk/debug/app-debug.apk
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ADR-Gods-Pro-v6
          path: app/build/outputs/apk/debug/app-debug.apk
